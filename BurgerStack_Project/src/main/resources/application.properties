spring.application.name=BurgerStack_Project

server.servlet.context-path=/burgerstack
server.port=8006

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# JDBC Datasource
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=BURGERSTACK
spring.datasource.password=BURGERSTACK

# MyBatis Configuration
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:mappers/**/*.xml

# File Configuration
burgerstack.file-store.root=./src/main/webapp/resources


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=60MB

